version: "3.1"

# Test stories (not used for training). Add or adjust as you grow coverage.
stories:
  - story: test player recommendation flow
    steps:
      - intent: greet
      - action: utter_hello
      - intent: request_field_recommendation
      - action: action_ensure_user_role
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - intent: inform
        entities:
          - sport: fútbol
          - location: Surco
      - action: field_recommendation_form
      - active_loop: null
      - action: action_submit_field_recommendation_form
      - action: action_close_chat_session
      - action: utter_goodbye

  - story: test pricing inquiry
    steps:
      - intent: ask_pricing_info
      - action: action_log_user_intent
      - action: utter_pricing_info

  - story: test promotions inquiry
    steps:
      - intent: show_promotions
      - action: action_ensure_user_role
      - action: utter_show_promotions

  - story: test reservation process
    steps:
      - intent: ask_reservation_process
      - action: action_log_user_intent
      - action: utter_reservation_process

  - story: test cancellation policy
    steps:
      - intent: ask_cancellation_policy
      - action: action_log_user_intent
      - action: utter_cancellation_policy

  - story: test fallback
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: nlu_fallback
      - action: utter_default_fallback
      - action: utter_what_can_you_do

  - story: test admin metrics continuity
    steps:
      - slot_was_set:
          - user_role: "admin"
      - intent: request_admin_metrics
        entities:
          - metric_type: "ocupacion"
          - metric_period: "semana"
      - action: action_route_admin_request
      - action: admin_metrics_form
      - active_loop: null
      - action: action_provide_admin_metrics
      - action: action_admin_post_topic_followup

  - story: test admin metrics followup with inform
    steps:
      - slot_was_set:
          - user_role: "admin"
      - intent: request_admin_metrics
        entities:
          - metric_type: "ocupacion"
          - metric_period: "semana"
      - action: action_route_admin_request
      - action: admin_metrics_form
      - active_loop: null
      - action: action_provide_admin_metrics
      - action: action_admin_post_topic_followup
      - intent: inform
      - action: action_route_admin_request
      - action: admin_metrics_form
      - active_loop: null
      - action: action_provide_admin_metrics
      - action: action_admin_post_topic_followup
      - intent: request_admin_metrics
        entities:
          - metric_type: "ingresos"
          - metric_period: "esta semana"
      - action: action_route_admin_request
      - action: admin_metrics_form
      - active_loop: null
      - action: action_provide_admin_metrics
      - action: action_admin_post_topic_followup

  - story: test admin route to top clients
    steps:
      - slot_was_set:
          - user_role: "admin"
      - intent: request_admin_top_clients
      - action: action_route_admin_request
      - action: action_provide_admin_campus_top_clients
      - action: action_admin_post_topic_followup

  - story: test admin route from nlu fallback
    steps:
      - slot_was_set:
          - user_role: "admin"
      - intent: nlu_fallback
      - action: action_route_admin_request

  - story: test switch from metrics form to another admin topic
    steps:
      - slot_was_set:
          - user_role: "admin"
      - action: admin_metrics_form
      - active_loop: admin_metrics_form
      - intent: request_admin_top_clients
      - action: action_deactivate_loop
      - action: action_route_admin_request
      - action: action_provide_admin_campus_top_clients
      - action: action_admin_post_topic_followup

  - story: test contextual followup with pending topics
    steps:
      - slot_was_set:
          - user_role: "admin"
      - slot_was_set:
          - admin_topic_detected: "metrics"
      - slot_was_set:
          - admin_topics_pending:
              - top_clients
      - action: action_admin_post_topic_followup
