version: "3.1"

stories:
  - story: saludo y recomendación completa
    steps:
      - intent: greet
      - action: action_ensure_user_role
      - action: utter_hello
      - slot_was_set:
          - user_role: "player"
      - intent: request_field_recommendation
        entities:
          - sport: "fulbito"
          - location: "Miraflores"
          - time: "20:00"
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - slot_was_set:
          - requested_slot: null
      - active_loop: null
      - action: action_submit_field_recommendation_form
      - intent: affirm
      - action: utter_thanks_for_feedback
      - action: utter_anything_else
      - intent: goodbye
      - action: action_ensure_user_role
      - action: action_close_chat_session
      - action: utter_goodbye

  - story: refine recommendation with inform
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: request_field_recommendation
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - intent: inform
        entities:
          - date: "mañana"
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - slot_was_set:
          - requested_slot: null
      - active_loop: null
      - action: action_submit_field_recommendation_form
      - intent: affirm
      - action: utter_thanks_for_feedback
      - action: utter_anything_else
  - story: formulario paso a paso con ayuda intermedia
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: request_field_recommendation
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - slot_was_set:
          - requested_slot: location
      - intent: help
      - action: action_deactivate_loop
      - active_loop: null
      - action: utter_what_can_you_do
      - intent: request_field_recommendation
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - slot_was_set:
          - requested_slot: null
      - active_loop: null
      - action: action_submit_field_recommendation_form
      - intent: goodbye
      - action: action_ensure_user_role
      - action: action_close_chat_session
      - action: utter_goodbye

  - story: doble fallback dentro del formulario
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: request_field_recommendation
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - intent: nlu_fallback
      - action: utter_default_fallback
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - intent: nlu_fallback
      - action: utter_default_fallback
      - action: field_recommendation_form
      - active_loop: field_recommendation_form

  - story: consulta de precios y retorno al formulario
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: request_field_recommendation
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - intent: ask_pricing_info
      - action: action_deactivate_loop
      - active_loop: null
      - action: utter_pricing_info
      - intent: request_field_recommendation
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - slot_was_set:
          - requested_slot: null
      - active_loop: null
      - action: action_submit_field_recommendation_form
      - intent: goodbye
      - action: action_ensure_user_role
      - action: action_close_chat_session
      - action: utter_goodbye

  - story: jugador pregunta promociones
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: show_promotions
      - action: action_ensure_user_role
      - action: utter_show_promotions

  - story: proceso de reserva explicado
    steps:
      - intent: ask_reservation_process
      - action: action_log_user_intent
      - action: utter_reservation_process

  - story: usuario pregunta cómo modificar su reserva
    steps:
      - intent: ask_modify_reservation
      - action: action_log_user_intent
      - action: utter_modify_reservation

  - story: usuario pregunta políticas de cancelación
    steps:
      - intent: ask_cancellation_policy
      - action: action_log_user_intent
      - action: utter_cancellation_policy

  - story: reprogramar reserva con respuesta de acción
    steps:
      - intent: ask_reprogram_reservation
      - action: action_reprogram_reservation
      - action: utter_anything_else

  - story: usuario cancela formulario de recomendación
    steps:
      - action: field_recommendation_form
      - active_loop: field_recommendation_form
      - intent: deny
      - action: action_deactivate_loop
      - action: action_reset_slots
      - action: action_log_abandonment
      - action: utter_help

  - story: confirmación positiva después de recomendación
    steps:
      - action: action_submit_field_recommendation_form
      - intent: affirm
      - action: utter_thanks_for_feedback
      - action: utter_anything_else

  - story: confirmación negativa después de recomendación
    steps:
      - action: action_submit_field_recommendation_form
      - intent: deny
      - action: utter_can_help_more
      - action: utter_what_can_you_do

  - story: jugador bloqueado en flujo admin por regla
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: request_admin_metrics
      - action: utter_admin_only_flow

  - story: administrador bloqueado en flujo jugador por regla
    steps:
      - slot_was_set:
          - user_role: "admin"
      - intent: request_field_recommendation
      - action: utter_player_only_flow

  - story: jugador envia datos sueltos y el bot retoma recomendacion
    steps:
      - slot_was_set:
          - user_role: "player"
      - intent: inform
        entities:
          - location: "Surco"
          - time: "20:00"
      - action: action_log_field_recommendation_request
      - action: field_recommendation_form
      - active_loop: field_recommendation_form

  - story: admin encadena top clientes y luego reservas totales
    steps:
      - slot_was_set:
          - user_role: "admin"
      - intent: request_admin_top_clients
      - action: action_route_admin_request
      - action: action_provide_admin_campus_top_clients
      - intent: request_admin_reservations_overview
      - action: action_route_admin_request
      - action: action_provide_admin_metrics

  - story: admin consulta horarios pico y reservas por estado
    steps:
      - slot_was_set:
          - user_role: "admin"
      - intent: request_admin_metrics
        entities:
          - metric_type: "horarios pico"
          - location: "Campus Surco"
          - metric_period: "esta semana"
      - action: action_route_admin_request
      - action: action_provide_admin_metrics
      - intent: request_admin_metrics
        entities:
          - metric_type: "reservas"
          - reservation_status: "en curso"
          - field_name: "cancha 1"
      - action: action_route_admin_request
      - action: action_provide_admin_metrics

  - story: usuario pregunta identidad y funciones
    steps:
      - intent: ask_bot_identity
      - action: utter_bot_identity
      - intent: help
      - action: action_ensure_user_role
      - action: utter_what_can_you_do
