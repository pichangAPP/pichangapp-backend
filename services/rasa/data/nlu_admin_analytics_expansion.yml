      - activo
      - en curso
      - en vivo
      - jugando
      - finalizada
      - finalizado
      - finalizadas
      - terminado
      - terminadas
      - cancelada
      - cancelado
      - canceladas
      - pendiente
      - pendientes
      - confirmada
      - confirmado
      - confirmadas

