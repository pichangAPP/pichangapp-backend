version: "3.1"

rules:
  - rule: initialize session
    conversation_start: true
    wait_for_user_input: false
    steps:
      - action: action_session_start

  - rule: enforce user role at start
    conversation_start: true
    wait_for_user_input: false
    steps:
      - action: action_ensure_user_role

  - rule: greet user and ensure role
    steps:
      - intent: greet
      - action: action_ensure_user_role
      - action: utter_hello

  - rule: say goodbye
    steps:
      - intent: goodbye
      - action: action_ensure_user_role
      - action: action_close_chat_session
      - action: utter_goodbye

  - rule: help intent outside form
    condition:
      - active_loop: null
    steps:
      - intent: help
      - action: action_ensure_user_role
      - action: utter_what_can_you_do

  - rule: help during form
    condition:
      - active_loop: field_recommendation_form
    steps:
      - intent: help
      - action: action_deactivate_loop
      - action: utter_what_can_you_do

  - rule: admin-only flow guard
    condition:
      - slot_was_set:
          - user_role: "admin"
    steps:
      - intent: request_field_recommendation
      - action: utter_player_only_flow

  - rule: player-only flow guard
    condition:
      - slot_was_set:
          - user_role: "player"
    steps:
      - intent: request_admin_recommendation
      - action: utter_admin_only_flow

  - rule: player guard admin top clients
    condition:
      - slot_was_set:
          - user_role: "player"
    steps:
      - intent: request_admin_top_clients
      - action: utter_admin_only_flow

  - rule: player guard admin field usage
    condition:
      - slot_was_set:
          - user_role: "player"
    steps:
      - intent: request_admin_field_usage
      - action: utter_admin_only_flow

  - rule: player guard admin demand alerts
    condition:
      - slot_was_set:
          - user_role: "player"
    steps:
      - intent: request_admin_demand_alerts
      - action: utter_admin_only_flow

  - rule: player guard admin metrics
    condition:
      - slot_was_set:
          - user_role: "player"
    steps:
      - intent: request_admin_metrics
      - action: utter_admin_only_flow

  - rule: show faqs
    steps:
      - intent: show_faqs
      - action: utter_top_faqs

  - rule: ask reservation process
    steps:
      - intent: ask_reservation_process
      - action: action_log_user_intent
      - action: utter_reservation_process

  - rule: ask how to modify reservation
    steps:
      - intent: ask_modify_reservation
      - action: action_log_user_intent
      - action: utter_modify_reservation

  - rule: ask cancellation policy
    steps:
      - intent: ask_cancellation_policy
      - action: action_log_user_intent
      - action: utter_cancellation_policy

  - rule: ask for pricing info outside forms
    condition:
      - active_loop: null
    steps:
      - intent: ask_pricing_info
      - action: utter_pricing_info

  - rule: ask pricing info during form
    condition:
      - active_loop: field_recommendation_form
    steps:
      - intent: ask_pricing_info
      - action: action_deactivate_loop
      - action: utter_pricing_info

  - rule: listen after recommendation submit
    steps:
      - action: action_submit_field_recommendation_form
      - action: action_listen

  - rule: reprogram reservation
    steps:
      - intent: ask_reprogram_reservation
      - action: action_reprogram_reservation
      - action: utter_anything_else

  - rule: show recommendation history
    steps:
      - intent: show_previous_recommendations
      - action: action_show_recommendation_history

  - rule: player asks about own reservations
    steps:
      - intent: request_user_reservations
      - action: action_list_user_reservations

  - rule: player guard admin reservations overview
    condition:
      - slot_was_set:
          - user_role: "player"
    steps:
      - intent: request_admin_reservations_overview
      - action: utter_admin_only_flow

  - rule: route admin reservations overview
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: request_admin_reservations_overview
      - action: action_route_admin_request

  - rule: admin reservations overview without role -> route
    condition:
      - slot_was_set:
          - user_role: null
    steps:
      - intent: request_admin_reservations_overview
      - action: action_ensure_user_role
      - action: action_route_admin_request

  - rule: ask feedback status
    steps:
      - intent: ask_feedback_status
      - action: action_check_feedback_status

  - rule: handle SetSlots rating
    steps:
      - intent: SetSlots
      - action: action_handle_feedback_rating

  - rule: thank after recommendation confirm
    steps:
      - action: action_submit_field_recommendation_form
      - intent: affirm
      - action: utter_thanks_for_feedback
      - action: utter_anything_else

  - rule: thank positive feedback
    steps:
      - intent: give_positive_feedback
      - action: utter_thanks_for_feedback

  - rule: react to negative feedback
    steps:
      - intent: give_negative_feedback
      - action: utter_sorry_for_experience
      - action: utter_what_can_you_do

  - rule: admin recommendation without role -> route
    condition:
      - slot_was_set:
          - user_role: null
    steps:
      - intent: request_admin_recommendation
      - action: action_ensure_user_role
      - action: action_route_admin_request

  - rule: admin top clients without role -> route
    condition:
      - slot_was_set:
          - user_role: null
    steps:
      - intent: request_admin_top_clients
      - action: action_ensure_user_role
      - action: action_route_admin_request

  - rule: admin field usage without role -> route
    condition:
      - slot_was_set:
          - user_role: null
    steps:
      - intent: request_admin_field_usage
      - action: action_ensure_user_role
      - action: action_route_admin_request

  - rule: admin demand alerts without role -> route
    condition:
      - slot_was_set:
          - user_role: null
    steps:
      - intent: request_admin_demand_alerts
      - action: action_ensure_user_role
      - action: action_route_admin_request

  - rule: admin metrics without role -> route
    condition:
      - slot_was_set:
          - user_role: null
    steps:
      - intent: request_admin_metrics
      - action: action_ensure_user_role
      - action: action_route_admin_request

  - rule: request recommendation without role
    condition:
      - slot_was_set:
          - user_role: null
    steps:
      - intent: request_field_recommendation
      - action: action_ensure_user_role
      - action: field_recommendation_form
      - active_loop: field_recommendation_form

  - rule: route admin recommendation
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: request_admin_recommendation
      - action: action_route_admin_request

  - rule: route admin top clients
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: request_admin_top_clients
      - action: action_route_admin_request

  - rule: route admin field usage
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: request_admin_field_usage
      - action: action_route_admin_request

  - rule: route admin demand alerts
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: request_admin_demand_alerts
      - action: action_route_admin_request

  - rule: route admin metrics
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: request_admin_metrics
      - action: action_route_admin_request

  - rule: route admin inform followup
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: inform
      - action: action_route_admin_request

  - rule: recover admin from nlu fallback
    condition:
      - slot_was_set:
          - user_role: "admin"
      - active_loop: null
    steps:
      - intent: nlu_fallback
      - action: action_route_admin_request

  - rule: fallback outside forms for player
    condition:
      - active_loop: null
      - slot_was_set:
          - user_role: "player"
    steps:
      - intent: nlu_fallback
      - action: utter_default_fallback
      - action: utter_what_can_you_do

  - rule: fallback outside forms without role
    condition:
      - active_loop: null
      - slot_was_set:
          - user_role: null
    steps:
      - intent: nlu_fallback
      - action: action_ensure_user_role
      - action: utter_default_fallback
      - action: utter_what_can_you_do

