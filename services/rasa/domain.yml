version: "3.1"

# ===============================================
# INTENCIONES
# ===============================================
intents:
  # Intenciones básicas
  # Nota: `use_entities: []` reduce falsos positivos en intenciones sin entidades.
  - greet:
      use_entities: []
  - goodbye:
      use_entities: []
  - affirm:
      use_entities: []
  - deny:
      use_entities: []
  - help:
      use_entities: []

  # Intenciones principales del negocio
  - request_field_recommendation
  - request_admin_recommendation
  - request_admin_top_clients
  - request_admin_field_usage
  - request_admin_demand_alerts
  - request_admin_metrics
  - ask_bot_identity:
      use_entities: []

  # Consultas informativas
  - ask_reservation_process:
      use_entities: []
  - ask_modify_reservation:
      use_entities: []
  - ask_cancellation_policy:
      use_entities: []
  - ask_reprogram_reservation:
      use_entities: []
  - ask_pricing_info
  - show_faqs:
      use_entities: []
  - show_promotions:
      use_entities: []

  # Funcionalidades de seguimiento
  - show_previous_recommendations
  - request_user_reservations
  - request_admin_reservations_overview
  - ask_feedback_status

  # Feedback del usuario
  - give_positive_feedback
  - give_negative_feedback

  # Intent para capturar información del usuario
  - inform

  # Intent especial para setear slots
  - SetSlots

  # Intent de fallback
  - nlu_fallback

# ===============================================
# ENTIDADES
# ===============================================
entities:
  - sport
  - location
  - time
  - date
  - budget
  - surface
  - rating
  - amenities
  - num_players
  - field_size
  - urgency_level
  - recurrence
  - metric_type
  - metric_period
  - field_name
  - reservation_status

# ===============================================
# SLOTS - Almacenamiento de información
# ===============================================
slots:
  # --- Slot para el rol del usuario ---
  user_role:
    type: categorical
    values:
      - player
      - admin
    influence_conversation: true
    mappings:
      - type: custom

  # --- Slots para recomendación de canchas ---
  sport:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: sport

  location:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: location

  time:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: time

  date:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: date

  budget:
    type: float
    min_value: 0
    max_value: 1000
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: budget

  surface:
    type: categorical
    values:
      - Grass mixto (natural + sintético)
      - Grass sintético
      - Grass sintético premium
      - Grass natural
      - Losa de cemento
      - Losa deportiva
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: surface

  rating:
    type: float
    min_value: 0
    max_value: 5
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: rating

  num_players:
    type: float
    min_value: 2
    max_value: 22
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: num_players

  field_size:
    type: categorical
    values:
      - pequeña
      - mediana
      - grande
      - completa
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: field_size

  urgency_level:
    type: categorical
    values:
      - urgente
      - normal
      - flexible
    influence_conversation: true
    mappings:
      - type: custom

  # --- Slots de control de conversación ---
  requested_slot:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para guardar recomendaciones previas
  last_recommendations:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para nombre del usuario
  user_name:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para ID del usuario
  user_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para token del usuario (auth)
  user_token:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para preferencias guardadas
  user_preferences:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para historial de feedback
  feedback_history:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para contador de interacciones
  interaction_count:
    type: float
    min_value: 0
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para indicar si es usuario recurrente
  is_returning_user:
    type: bool
    influence_conversation: true
    mappings:
      - type: custom

  # Slot para amenidades requeridas
  amenities:
    type: list
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: amenities

  # Slot para tracking de formulario abandonado
  form_abandoned:
    type: bool
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para contexto de última acción
  last_action_context:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para indicar si mostró precios
  showed_pricing:
    type: bool
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para seguimiento de FAQs vistas
  faqs_viewed:
    type: list
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para idioma preferido (futuro)
  preferred_language:
    type: categorical
    values:
      - es
      - en
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para tema del chat
  chat_theme:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  managed_campus_id:
    type: text
    influence_conversation: false
    mappings:
      - type: controlled
  managed_campus_name:
    type: text
    influence_conversation: false
    mappings:
      - type: controlled

  admin_metric_type:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: metric_type

  admin_metric_period:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: metric_period

  admin_field_name:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: field_name

  admin_reservation_status:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: reservation_status

  admin_topic_detected:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  admin_topics_pending:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  admin_last_topic:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  routing_confidence:
    type: float
    influence_conversation: false
    mappings:
      - type: custom

  admin_routing_reason:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  admin_routing_corrections:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  # Slot para id de sesión del chatbot
  chatbot_session_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  # Slots para preferencias inferidas de recomendación
  preferred_location:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  preferred_surface:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  preferred_sport:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  preferred_date:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  preferred_start_time:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  preferred_end_time:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  preferred_budget:
    type: float
    influence_conversation: true
    mappings:
      - type: custom

# ===============================================
# FORMS - Formularios para recopilar información
# ===============================================
forms:
  field_recommendation_form:
    required_slots:
      - location
      - sport
      - time
      - date

# ===============================================
# RESPONSES - Respuestas del bot
# ===============================================
responses:
  # --- Saludos y despedidas ---
  utter_hello:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "Estimado administrador, estoy listo para coordinar la operación de sus sedes. ¿Qué área desea revisar hoy o qué reporte quiere ver?"
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "Hola, admin. ¿Qué indicador o reporte quieres revisar primero?"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¡Hola! Soy Chato Bot y estoy listo para ayudarte a encontrar la mejor cancha para tu partido."
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¡Hola! Dime dónde y cuándo quieres jugar y te ayudo a buscar."
    - text: "¡Habla! me llamo Chato, tu asistente virtual para coordinar pichangas. ¿En qué te ayudo?"
    - text: "¡Hola! Aquí para ayudarte a encontrar la cancha ideal 🏃"
    - text: "¡Saludos! Dime qué necesitas y te consigo la mejor cancha 🎯"
    - text: "¡Bienvenido! Estoy aquí para que encuentres donde jugar 🏀"
    - text: "¡Hola! Cuenta conmigo para buscar cancha o resolver tus dudas."
    - text: "Listo, dime zona y hora, y te paso opciones al toque."
    - text: "Vamos directo: distrito, deporte y horario."

  utter_goodbye:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "Ha sido un gusto asistirle con sus sedes. Si desea retomar la gestión, estaré atento a sus indicaciones."
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¡Perfecto! Que disfrutes tu partido. Cuando necesites otra reserva, aquí estaré."
    - text: "¡Hasta luego! Vuelve cuando quieras coordinar una nueva cancha."

  utter_already_greeted:
    - text: "Ya nos saludamos 😊 ¿En qué más puedo ayudarte?"
    - text: "¡Ya estamos conversando! ¿Qué necesitas?"

  # --- Ayuda ---
  utter_what_can_you_do:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: |
        Puedo darte respuestas directas de gestión: ingresos, ocupación, reservas activas (hoy/mañana), clientes frecuentes y uso de canchas por sede.
        Puedes cambiar de tema en cualquier momento y sigo la conversación sin reiniciar formulario.
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: |
        Te ayudo con métricas, clientes top y uso de canchas.
        Solo dime qué reporte necesitas.
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: |
        Puedes pedirme directo:
        - reservas totales hoy
        - quiénes han reservado más
        - uso de canchas este mes
        y te respondo sin vueltas.
    - condition:
        - type: slot
          name: user_role
          value: player
      text: |
        Puedo ayudarte con todo lo necesario para tu juego:
        - Recomendarte canchas según barrio, horario y deporte.
        - Contarte cómo reservar, reprogramar o cancelar sin complicaciones.
        - Mostrarte tu historial de sugerencias y los comentarios que dejaste.
        - Avisarte sobre promos o detalles importantes de las sedes.
    - condition:
        - type: slot
          name: user_role
          value: player
      text: |
        Te puedo ayudar a encontrar cancha, ver precios y resolver dudas rápidas.
        Dime qué necesitas y lo armamos.
    - condition:
        - type: slot
          name: user_role
          value: player
      text: |
        También entiendo mensajes cortos tipo:
        "por surco", "8pm", "cancha libre", "cerca mío".
        Con eso te guío rápido.
    - text: |
        Puedo darte una mano con:
        - Recomendarte canchas según el barrio, horario y deporte que buscas.
        - Contarte cómo reservar, reprogramar o cancelar sin complicaciones.
        - Mostrarte tu historial de sugerencias y los comentarios que dejaste.
        - Avisarte sobre promos o detalles importantes de las sedes.
        - Si eres administrador, puedo contarte quiénes rentan más frecuentemente tus espacios.
      metadata:
        rephrase: True

  utter_help:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "¿Necesitás que revise algo? Estoy para ayudarte con la gestión."
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¿Querés que siga buscando otra cancha, presupuesto o horario? Te acompaño en lo que necesites para armar el partido."
    - text: "¿Hay algo más en lo que pueda ayudarte?"
    - text: "¿Necesitas ayuda con algo más?"
    - text: "¿Qué más puedo hacer por ti?"
    - text: "Estoy aquí para lo que necesites 😊"
    - text: "¿Alguna otra duda?"

  # Se muestra a usuarios con rol player cuando intentan flujos que son exclusivos de administrador
  # (métricas, uso de canchas, clientes frecuentes, etc.).
  utter_admin_only_flow:
    - text: "Ese flujo es exclusivo para administradores. Si necesitas buscar cancha como jugador, dime qué quieres y te ayudo enseguida."
    - text: "Esa funcionalidad está reservada para cuentas admin. Puedo ayudarte con recomendaciones, reservas y promociones como jugador."
    - text: "Esa consulta es para admin. Como jugador, te ayudo a buscar cancha por zona, horario y deporte."

  # Se muestra a usuarios con rol admin cuando piden acciones pensadas solo para players
  # (recomendarse una cancha, pedir una reserva propia, etc.).
  utter_player_only_flow:
    - text: "Estoy en modo administrador y ese flujo es de jugador. Dime si quieres revisar métricas, ocupación, ingresos o clientes frecuentes de tus sedes."
    - text: "Esa acción está pensada para jugadores. Desde tu cuenta admin puedo darte reportes, reservas activas o tendencias de tus canchas."
    - text: "Ese pedido es de jugador. En modo admin te puedo dar reservas totales, top clientes, uso de canchas o métricas."

  utter_anything_else:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "¿Querés que revisemos otra cosa o coordinemos alguna operación adicional?"
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "¿Quieres otro reporte o revisamos otra sede?"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¿Te gustaría buscar otra cancha o necesitas algo más?"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¿Buscamos otra opción o te ayudo con algo más?"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "Si quieres, dime 'otra por surco' o 'más tarde' y sigo con la búsqueda."
    - text: "¿Hay algo más que pueda hacer por ti?"
    - text: "¿Necesitas ayuda con otra cosa?"
    - text: "¿Quieres que te ayude con algo más?"
    - text: "Estoy aquí si necesitas algo más."

  utter_can_help_more:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "¿Desea que revise otro indicador o coordine una operación adicional?"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "Entiendo. ¿Hay algo más en lo que pueda asistirte?"
    - text: "No hay problema. ¿Puedo ayudarte con otra cosa?"
    - text: "Está bien. ¿Necesitas información sobre algo más?"

  # --- Preguntas del formulario ---
  utter_ask_location:
    - text: "¿En qué distrito quieres jugar?"
      buttons:
        - title: "Villa El Salvador"
          payload: '/inform{"location":"Villa El Salvador"}'
        - title: "Chorrillos"
          payload: '/inform{"location":"Chorrillos"}'
        - title: "Surco"
          payload: '/inform{"location":"Surco"}'
        - title: "San Isidro"
          payload: '/inform{"location":"San Isidro"}'
    - text: "¿Cuál es tu zona preferida?"
      buttons:
        - title: "Villa El Salvador"
          payload: '/inform{"location":"Villa El Salvador"}'
        - title: "Chorrillos"
          payload: '/inform{"location":"Chorrillos"}'
        - title: "Surco"
          payload: '/inform{"location":"Surco"}'
        - title: "San Isidro"
          payload: '/inform{"location":"San Isidro"}'
        - title: "Otra zona"
          payload: '/inform{"location":"otra"}'
    - text: "¿Por qué distrito te queda mejor?"
    - text: "¿Dónde prefieres jugar?"
    - text: "Indícame el distrito o zona donde buscas cancha"

  utter_ask_sport:
    - text: "¿Qué deporte vas a practicar?"
      buttons:
        - title: "⚽ Fulbito"
          payload: '/inform{"sport":"football"}'
        - title: "🎾 Tenis"
          payload: '/inform{"sport":"tennis"}'
        - title: "🏀 Basket"
          payload: '/inform{"sport":"basketball"}'
        - title: "🏐 Voley"
          payload: '/inform{"sport":"voleyball"}'
    - text: "¿Qué deporte quieres jugar?"
      buttons:
        - title: "⚽ Fútbol"
          payload: '/inform{"sport":"football"}'
        - title: "🎾 Tenis"
          payload: '/inform{"sport":"tennis"}'
        - title: "🏀 Basket"
          payload: '/inform{"sport":"basketball"}'
        - title: "Otro"
          payload: '/inform{"sport":"otro"}'
    - text: "¿Para qué deporte necesitas la cancha?"
    - text: "Dime qué deporte van a practicar"

  utter_ask_time:
    - text: "¿A qué hora quieres jugar? (ejemplo: 20:00)"
    - text: "¿Qué horario prefieres? (formato 24h: 19:00)"
    - text: "¿A qué hora te gustaría reservar?"
    - text: "Indícame la hora aproximada (ejemplo: 18:00)"
    - text: "¿Qué hora te viene bien? (ej: 20:30)"

  utter_ask_date:
    - text: "¿Para qué día necesitas la cancha? (ejemplo: 2025-11-20, 'hoy' o 'mañana')"

  utter_ask_budget:
    - text: "¿Cuál es tu presupuesto aproximado? (en soles)"
    - text: "¿Hasta cuánto estás dispuesto a pagar por hora?"
    - text: "¿Tienes un presupuesto en mente?"

  utter_ask_surface:
    - text: "¿Qué tipo de superficie prefieres?"
      buttons:
        - title: "Grass sintético"
          payload: '/inform{"surface":"grass sintético"}'
        - title: "Grass natural"
          payload: '/inform{"surface":"grass natural"}'
        - title: "Losa de cemento"
          payload: '/inform{"surface":"losa de cemento"}'
        - title: "Me da igual"
          payload: "/affirm"

  # --- Información ---
  utter_reservation_process:
    - text: |
        📋 Para reservar una cancha:

        1️⃣ Dime tus preferencias (ubicación, deporte, horario)
        2️⃣ Te mostraré las mejores opciones disponibles
        3️⃣ Elige la que más te guste
        4️⃣ Confirma tu reserva en la app

        ¿Quieres que te ayude a buscar ahora?
    - text: |
        🎯 El proceso es súper simple:

        • Me dices qué, dónde y cuándo quieres jugar
        • Te muestro las opciones disponibles con precios
        • Seleccionas tu favorita
        • Confirmas en la app y listo!

        ¿Empezamos?
    - text: |
        Reservar es fácil:
        1. Me dices barrio, deporte y horario
        2. Te paso opciones disponibles
        3. Eliges la mejor y confirmas en la app

        ¿Buscamos una cancha?
    - text: |
        Para reservar:
        • Dime dónde, cuándo y qué deporte
        • Te muestro opciones con precios
        • Confirmas en la app

        ¿Te ayudo con eso?

  utter_modify_reservation:
    - text: |
        Para modificar una reserva existente:

        📱 Ingresa a la app de PichangApp
        📋 Ve a la sección "Mis Reservas"
        ✏️ Selecciona la reserva que quieres modificar
        🔄 Elige nueva fecha/hora según disponibilidad
        ✅ Consulta con el administrador de la cancha

        Nota: Las modificaciones están sujetas a disponibilidad y políticas de cada cancha.
    - text: |
        🔄 Para cambiar tu reserva:

        1. Entra a la app
        2. Toca "Mis Reservas"
        3. Selecciona la que quieres cambiar
        4. Consulta con el administrador de la cancha

        ⚠️ Hazlo con al menos 6 horas de anticipación.

  utter_cancellation_policy:
    - text: |
        📜 Política de Cancelación:

        ✅ Cancelación gratuita: hasta 24h antes
        ⚠️ Entre 24h-6h antes: cargo del 50%
        ❌ Menos de 6h antes: cargo del 100%

        💡 Para cancelar:
        • Ingresa a la app
        • Ve a "Mis Reservas"
        • Selecciona la reserva
        • Toca "Cancelar"

        El reembolso (si aplica) se procesa en 3-5 días hábiles.
    - text: |
        🚫 Reglas de Cancelación:

        📅 +24 horas antes → 100% reembolso
        ⏰ 6-24 horas antes → 50% reembolso
        ⚡ -6 horas antes → Sin reembolso

        Las cancelaciones se hacen desde "Mis Reservas" en la app.

  utter_pricing_info:
    - text: |
        💰 Información de Precios:

        Los precios varían según:
        📍 Ubicación (distrito)
        ⚽ Tipo de cancha y deporte
        🕐 Horario (mañana, tarde, noche)
        📅 Día de la semana
        🏟️ Instalaciones y servicios

        💡 Rango general:
        • Fulbito: S/50 - S/120 por hora
        • Pádel: S/60 - S/150 por hora
        • Basket/Voley: S/40 - S/100 por hora

        Dime qué buscas y te muestro opciones con precios exactos.
    - text: |
        💵 Los precios dependen de varios factores:

        🌆 Zona (distritos premium son más caros)
        🌙 Horario (noche suele ser más caro)
        📆 Día (fines de semana tienen tarifas especiales)
        ⭐ Calidad de instalaciones

        ¿Quieres que busque opciones en tu presupuesto?
    - text: |
        Los precios varían por zona, horario y tipo de cancha.
        Si me dices tu presupuesto y distrito, te paso opciones reales.
    - text: |
        Te doy precios exactos si me dices:
        • distrito
        • deporte
        • horario

        ¿Qué buscas?
    - text: |
        Te cotizo rápido si me dices zona + deporte + hora.
        Con eso te doy rango real de precios.

  utter_top_faqs:
    - text: |
        ❓ Preguntas Frecuentes:

        • ¿Cómo reservo una cancha?
        • ¿Puedo cancelar mi reserva?
        • ¿Cuánto cuesta alquilar?
        • ¿Hay descuentos o promociones?
        • ¿Qué métodos de pago aceptan?
        • ¿Las canchas tienen estacionamiento?
        • ¿Prestan balones o equipamiento?
        • ¿Hay vestuarios y duchas?

        ¿Sobre cuál quieres saber más?
    - text: |
        🔍 Dudas Comunes:

        1. Proceso de reserva
        2. Formas de pago
        3. Políticas de cancelación
        4. Modificación de reservas
        5. Precios y promociones
        6. Servicios incluidos

        Pregúntame sobre cualquiera de estos temas.
    - text: "Si quieres ir al grano, pregúntame: precios, cancelación, reprogramación, promos o cómo reservar."

  # --- Fallback ---
  utter_default_fallback:
    - text: "Disculpa, no entendí bien. ¿Podrías reformularlo?"
    - text: "No estoy seguro de entender. ¿Puedes explicarlo de otra forma?"
    - text: "Perdona, no capté eso. ¿Podrías decirlo diferente?"
    - text: "No entendí bien. ¿Me lo puedes decir de otra manera?"
    - text: "Mmm, no comprendí. Intenta con otras palabras por favor 🤔"
    - text: "Uy, se me pasó. ¿Me lo puedes explicar con otras palabras?"
    - text: "Perdón, no lo capté. ¿Cómo lo dirías de otra manera?"
    - text: "Prueba corto: 'por surco', '8pm', 'precios', 'reservas totales hoy' o 'top clientes'."
    - text: "No lo capté completo. Dame una frase directa y lo resolvemos rápido."

  utter_ask_rephrase:
    - text: "Lo siento, no capté eso. ¿Podrías decirlo de otra manera?"
    - text: "No entendí bien. ¿Puedes reformular tu pregunta?"

  # --- Feedback ---
  utter_ask_for_feedback:
    - text: "¿Qué te pareció mi ayuda? Califícame del 1 al 5"
      buttons:
        - title: "1"
          payload: '/give_negative_feedback{"rating":"1"}'
        - title: "2"
          payload: '/give_negative_feedback{"rating":"2"}'
        - title: "3"
          payload: '/give_negative_feedback{"rating":"3"}'
        - title: "4"
          payload: '/give_positive_feedback{"rating":"4"}'
        - title: "5"
          payload: '/give_positive_feedback{"rating":"5"}'
    - text: "¿Te fue útil mi ayuda? Déjame una valoración ⭐"

  utter_thanks_for_feedback:
    - text: "¡Gracias por tu feedback! Me ayuda a mejorar 🙏"
    - text: "¡Muchas gracias por tu opinión! La tengo en cuenta 😊"
    - text: "¡Gracias! Tu feedback es muy valioso ⭐"
    - text: "¡Genial! Gracias por tomarte el tiempo de calificarme 🎯"

  utter_sorry_for_experience:
    - text: "Lamento no haber cumplido tus expectativas 😔 ¿Qué puedo mejorar?"
    - text: "Disculpa si no te ayudé como esperabas. Cuéntame qué puedo hacer mejor."
    - text: "Lo siento mucho. ¿Hay algo específico que no funcionó bien?"

  # --- Confirmaciones y continuidad ---
  utter_are_you_still_there:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "¿Sigues ahí? ¿Necesitas más tiempo o querés que vuelva a revisar las métricas?"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¿Sigues ahí? ¿Necesitas más tiempo?"
    - text: "Hola, ¿continuamos con la búsqueda?"
    - text: "¿Sigues buscando cancha?"

  # --- Mensajes informativos adicionales ---
  utter_processing:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "Un momento, reviso las mejores métricas... 🔍"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "Un momento, estoy buscando las mejores opciones... 🔍"
    - text: "Déjame revisar las canchas disponibles... ⏳"
    - text: "Buscando canchas que coincidan con tus preferencias... 🎯"

  utter_no_results:
    - text: "No encontré canchas con esos criterios. ¿Quieres modificar algún parámetro?"
    - text: "No hay disponibilidad para esa fecha/hora. ¿Probamos con otra?"
    - text: "Hmm, no hay opciones disponibles. ¿Cambiamos la ubicación o el horario?"

  utter_recommend_alternatives:
    - condition:
        - type: slot
          name: user_role
          value: admin
      text: "¿Querés ver otras sedes o analizar horarios alternativos?"
    - condition:
        - type: slot
          name: user_role
          value: player
      text: "¿Te gustaría ver opciones en zonas cercanas?"
    - text: "Puedo mostrarte alternativas en horarios similares."
    - text: "¿Qué tal si revisamos otras fechas disponibles?"

  utter_saved_preferences:
    - text: "He guardado tus preferencias para próximas búsquedas 💾"
    - text: "Preferencias guardadas. La próxima vez será más rápido ✅"

  utter_welcome_back:
    - text: "¡Hola de nuevo! ¿Buscamos cancha como la última vez?"
    - text: "¡Bienvenido otra vez! ¿Mismas preferencias que antes?"

  utter_first_time:
    - text: "¡Bienvenido a PichangApp! Es tu primera vez, déjame ayudarte 🎯"
    - text: "¡Hola! Veo que es tu primera búsqueda. Te guiaré paso a paso 😊"

  # --- Mensajes para diferentes deportes ---
  utter_fulbito_tips:
    - text: "⚽ Tip: Las canchas de fulbito son más económicas entre semana y en horarios de mañana."

  utter_padel_tips:
    - text: "🎾 Tip: El pádel suele ser más caro pero muchas canchas ofrecen descuentos por reservas recurrentes."

  utter_basket_tips:
    - text: "🏀 Tip: Algunas canchas de basket incluyen balones y vestuarios sin costo extra."

  utter_admin_menu:
    - text: |
        📊 Panel de Administrador:

        • Ver clientes frecuentes
        • Alertas de demanda
        • Consejos de gestión
        • Análisis de ocupación
        • Tendencias de reserva

        ¿Qué deseas consultar?

  utter_ask_admin_metric_type:
    - text: "¿Qué métrica necesitas? Puedes pedir ingresos, ocupación, clientes, canchas, tráfico, comparativo o tendencia."

  utter_ask_admin_metric_period:
    - text: "¿Para qué periodo? Hoy, esta semana o este mes."

  utter_admin_metrics_followup:
    - text: "¿Quieres otra métrica o revisar otra sede?"

  utter_bot_identity:
    - text: "Me llamo Chato. Soy el asistente de PichangApp y puedo ayudarte con recomendaciones de canchas, reservas y métricas de administración."
    - text: "Soy Chato, el asistente virtual de PichangApp. En modo admin puedo revisar ingresos, ocupación, reservas, clientes frecuentes y uso de canchas por sede."

  # --- Validaciones y errores ---
  utter_invalid_time:
    - text: "Ese horario no parece válido. Usa formato 24h (ejemplo: 19:00)"
    - text: "Por favor ingresa una hora válida (00:00 a 23:59)"

  utter_invalid_date:
    - text: "Fecha no válida. Intenta con 'hoy', 'mañana' o formato DD/MM/YYYY"
    - text: "No reconozco esa fecha. ¿Puedes probar con otro formato?"

  utter_invalid_budget:
    - text: "El presupuesto debe ser un número positivo en soles"
    - text: "Por favor ingresa un presupuesto válido (ejemplo: 80)"

  utter_past_date:
    - text: "Esa fecha ya pasó. ¿Quieres una fecha futura?"
    - text: "No puedo reservar en el pasado 😅 Dame una fecha futura."

  # --- Promociones y ofertas ---
  utter_show_promotions:
    - text: |
        🎉 Promociones Activas:

        • Lunes a Viernes 10am-5pm: -20%
        • Reserva 3 canchas o más: -15%
        • Cliente nuevo: primera reserva -10%

        ¿Te interesa alguna?

  utter_discount_applied:
    - text: "¡Genial! Aplicamos el descuento a tu búsqueda 💰"

# ===============================================
# ACTIONS - Acciones personalizadas
# ===============================================
actions:
  # Acciones de sesión
  - action_session_start
  - action_ensure_user_role
  - action_close_chat_session

  # Acciones de recomendación
  - action_log_field_recommendation_request
  - action_submit_field_recommendation_form
  - action_show_recommendation_history
  - action_log_urgent_request
  - action_reprogram_reservation
  - action_list_user_reservations

  # Acciones de administrador
  - action_route_admin_request
  - action_admin_post_topic_followup
  - action_provide_admin_management_tips
  - action_provide_admin_field_usage
  - action_provide_admin_campus_top_clients
  - action_provide_admin_demand_alerts
  - action_provide_admin_metrics

  # Acciones de feedback
  - action_check_feedback_status
  - action_handle_feedback_rating

  # Acciones de formulario
  - validate_field_recommendation_form
  - action_deactivate_loop

  # Acciones de utilidad
  - action_default_fallback
  - action_reset_slots
  - action_check_inactivity
  - action_log_conversation_start
  - action_log_conversation_end
  - action_log_abandonment
  - action_log_user_intent

  # Acciones de validación
  - action_validate_time
  - action_validate_date
  - action_validate_budget

  # Acciones de personalización
  - action_load_user_preferences
  - action_save_user_preferences
  - action_check_returning_user

# ===============================================
# SESSION CONFIG
# ===============================================
session_config:
  session_expiration_time: 60 # minutos
  carry_over_slots_to_new_session: true
