version: "3.1"

recipe: default.v1

language: es

# ===============================================
# PIPELINE - Procesamiento de Lenguaje Natural
# ===============================================
pipeline:
  # Tokenización básica para español
  - name: WhitespaceTokenizer

  # Características de expresiones regulares (tiempo, fechas, etc.)
  - name: RegexFeaturizer

  # Características léxicas y sintácticas (incluye lookup tables)
  - name: LexicalSyntacticFeaturizer

  # Vectorización de palabras completas
  - name: CountVectorsFeaturizer
    analyzer: word
    min_ngram: 1
    max_ngram: 3

  # Vectorización de caracteres (útil para errores de tipeo)
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  # Clasificador principal DIET (Dual Intent Entity Transformer)
  # Es el corazón del NLU - clasifica intenciones y extrae entidades
  - name: DIETClassifier
    epochs: 300 # Incrementar si tienes más datos
    constrain_similarities: true
    model_confidence: softmax
    entity_recognition: true

    # Arquitectura del modelo
    embedding_dimension: 64
    transformer_size: 512

    # Dropout para prevenir overfitting
    drop_rate: 0.2
    drop_rate_attention: 0.2

    # Usar masked language model para mejor comprensión contextual
    use_masked_language_model: true

    # Balanceo de clases si tienes intenciones desbalanceadas
    # batch_strategy: "balanced"

    # Learning rate
    learning_rate: 0.001

  # Mapeo de sinónimos a valores canónicos
  - name: EntitySynonymMapper

  # Response Selector para responder FAQs directamente
  - name: ResponseSelector
    epochs: 100
    retrieval_intent: faq
    constrain_similarities: true

  # Reranker determinístico: promueve intents cuando el mensaje contiene
  # keywords pivote (reservaciones, ingresos, ocupación, etc.) y DIET
  # está dudoso. Se ejecuta ANTES del FallbackClassifier para que el
  # intent correcto llegue al top con confidence >= threshold.
  - name: components.keyword_reranker.KeywordIntentReranker
    max_gap: 0.25
    min_top_confidence: 0.9
    promoted_confidence: 0.85
    ignore_accents: true
    rules:
      - pattern: "\\b(reservaciones?|mis reservas|reservas que tengo|tengo reservas?|reservas proximas|proximas reservas)\\b"
        intent: request_user_reservations
      - pattern: "\\b(recomendaciones? (previa|anterior|hecha|pasada)s?|historial de (sugerencias|recomendaciones)|mis sugerencias (previas|anteriores))\\b"
        intent: show_previous_recommendations
      - pattern: "\\b(reservas? activas?|reservas? de (hoy|manana|el dia)|cuantas reservas|resumen de reservas|reservas del dia)\\b"
        intent: request_admin_reservations_overview
      - pattern: "\\b(ingresos?|facturacion|ganancias?|recaudado|cuanto (genere|generamos|cobramos|facturamos)|ventas del (dia|mes|semana))\\b"
        intent: request_admin_metrics
      - pattern: "\\b(ocupacion|que tan (llena|lleno|ocupada|ocupado)|porcentaje de (uso|ocupacion)|nivel de ocupacion)\\b"
        intent: request_admin_metrics
      - pattern: "\\b(tendencia|grafica semanal|ultimos 7 dias|ultima semana|evolucion semanal)\\b"
        intent: request_admin_metrics
      - pattern: "\\b(canchas? (mas|menos) (usada|ocupada|alquilada|reservada)s?|top canchas?|ranking de canchas?|canchas? mas populares)\\b"
        intent: request_admin_field_usage
      - pattern: "\\b(clientes? (frecuentes?|top|mas (fieles|recurrentes?|asiduos?)|leales?|vip)|jugadores? frecuentes?|quienes? vienen mas)\\b"
        intent: request_admin_top_clients
      - pattern: "\\b(reprogramar|cambiar (la |mi )?reserva|mover (la |mi )?reserva|pasar (la |mi )?reserva a otr[ao])\\b"
        intent: ask_reprogram_reservation
      - pattern: "\\b(como (se )?cancela|politica de cancelacion|cancelar reserva|anular reserva|quiero cancelar|puedo cancelar)\\b"
        intent: ask_cancellation_policy
      - pattern: "\\b(modificar reserva|cambiar (los )?(datos|horario) de (la |mi )?reserva|editar reserva)\\b"
        intent: ask_modify_reservation
      - pattern: "\\b(recomienda(me)?|sugiere(me)?|busca(me)? cancha|donde (puedo|podemos) jugar|necesito una cancha)\\b"
        intent: request_field_recommendation
      - pattern: "\\b(demanda|alertas? de demanda|sedes (llenas|saturadas)|horarios pico|cuando hay mas gente)\\b"
        intent: request_admin_demand_alerts
      - pattern: "\\b(promociones?|ofertas?|descuentos?|promos?)\\b"
        intent: show_promotions
      - pattern: "\\b(como reservo|como hago (una|la) reserva|proceso de reserva|pasos para reservar)\\b"
        intent: ask_reservation_process
      - pattern: "\\b(precios?|tarifas?|cuanto cuesta|cuanto cobran|costo de (la |una )?reserva)\\b"
        intent: ask_pricing_info

  # Clasificador de fallback para baja confianza
  - name: FallbackClassifier
    threshold: 0.7 # Confianza mínima para aceptar predicción
    ambiguity_threshold: 0.1 # Diferencia mínima entre top 2 intenciones

# ===============================================
# POLICIES - Predicción de siguiente acción
# ===============================================
policies:
  # Memorización de patrones exactos (muy útil para reglas)
  - name: MemoizationPolicy
    max_history: 5 # Cuántos turnos recordar

  # Política basada en reglas (determinística)
  - name: RulePolicy
    core_fallback_threshold: 0.4
    core_fallback_action_name: "action_default_fallback"
    enable_fallback_prediction: true
    restrict_rules: true # Las reglas solo se aplican cuando coinciden exactamente

  # TED Policy - Transformer Embedding Dialogue
  # La política más potente para conversaciones complejas
  - name: TEDPolicy
    max_history: 5
    epochs: 300
    constrain_similarities: true
    model_confidence: softmax

    # Arquitectura del transformer (se usan los valores por defecto para los tamaños)
    embedding_dimension: 64

    # Regularización
    drop_rate: 0.2
    drop_rate_attention: 0.2

    # Learning rate
    learning_rate: 0.001

    # Prevenir predicciones de loops infinitos
    # use_max_loop_count: true
    # max_loop_count: 3

# ===============================================
# CONFIGURACIONES ADICIONALES
# ===============================================
assistant_id: chato-bot
