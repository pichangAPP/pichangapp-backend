<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <title>{{ app_brand }} · Nueva solicitud de negocio</title>
    <style>
        body { margin: 0; padding: 0; background: #e2e8f0; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 40px; }
        .card { background: #ffffff; border-radius: 14px; overflow: hidden; box-shadow: 0 10px 36px rgba(15, 23, 42, 0.08); }
        .head { background: #0f172a; color: #f8fafc; padding: 20px 24px; }
        .head h1 { margin: 0; font-size: 20px; color: #f8fafc !important; -webkit-text-fill-color: #f8fafc !important; }
        .body { padding: 24px; }
        .meta { margin: 0 0 14px; color: #475569; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
        td { padding: 12px 14px; font-size: 14px; vertical-align: top; border-bottom: 1px solid #e2e8f0; }
        tr:last-child td { border-bottom: 0; }
        td:first-child { width: 170px; font-weight: 700; color: #334155; background: #f8fafc; }
        @media (prefers-color-scheme: dark) {
            body { background: #0b1220 !important; color: #e2e8f0 !important; }
            .card { background: #0f172a !important; border: 1px solid #1e293b !important; box-shadow: none !important; }
            .head { background: #1e293b !important; }
            .meta { color: #cbd5e1 !important; }
            table, td { border-color: #334155 !important; }
            td:first-child { background: #111c30 !important; color: #93c5fd !important; }
        }
        [data-ogsc] .card { background: #0f172a !important; border: 1px solid #1e293b !important; box-shadow: none !important; }
        [data-ogsc] .head { background: #1e293b !important; }
        [data-ogsc] table, [data-ogsc] td { border-color: #334155 !important; }
        [data-ogsc] td:first-child { background: #111c30 !important; color: #93c5fd !important; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="head">
                <h1>Nueva solicitud de negocio</h1>
            </div>
            <div class="body">
                <p class="meta">Solicitud recibida el {{ submitted_at }}.</p>
                <table role="presentation" cellpadding="0" cellspacing="0">
                    <tr><td>Negocio</td><td>{{ business_name }}</td></tr>
                    <tr><td>Titular</td><td>{{ owner_name }}</td></tr>
                    <tr><td>Correo</td><td>{{ email }}</td></tr>
                    <tr><td>Telefono</td><td>{{ phone }}</td></tr>
                    <tr><td>Direccion</td><td>{{ address }}</td></tr>
                    <tr><td>Descripcion</td><td>{{ description }}</td></tr>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
