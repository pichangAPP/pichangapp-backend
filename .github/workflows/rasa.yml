# Rasa Pro: validar datos y tests de historias (sin entrenar; el modelo debe existir en artifacts/models).
name: Rasa service

on:
  push:
    paths:
      - "services/rasa/**"
      - ".github/workflows/rasa.yml"
  pull_request:
    paths:
      - "services/rasa/**"
      - ".github/workflows/rasa.yml"

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rasa data validate
        env:
          RASA_PRO_LICENSE: ${{ secrets.RASA_PRO_LICENSE }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/services/rasa:/app" \
            -w /app \
            -e RASA_PRO_LICENSE \
            rasa/rasa-pro:3.12.3 \
            rasa data validate

      - name: Comprobar modelo para story tests
        run: |
          set -e
          if ! ls "${{ github.workspace }}/services/rasa/artifacts/models"/*.tar.gz >/dev/null 2>&1; then
            echo "::error::No hay ningún .tar.gz en services/rasa/artifacts/models. Entrena en local, copia el modelo ahí y súbelo al repo (si .gitignore lo bloquea, usa git add -f)."
            exit 1
          fi

      - name: Rasa story tests
        env:
          RASA_PRO_LICENSE: ${{ secrets.RASA_PRO_LICENSE }}
          RASA_ENFORCE_JWT_FOR_ADMIN_ACTIONS: "false"
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/services/rasa:/app" \
            -w /app \
            -e RASA_PRO_LICENSE \
            -e RASA_ENFORCE_JWT_FOR_ADMIN_ACTIONS \
            rasa/rasa-pro:3.12.3 \
            rasa test --stories tests/stories_test.yml --model artifacts/models
