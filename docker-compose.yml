version: "3.9"

x-shared-venv-image: &shared-venv-image fabrizziocastro/pichangapp-containers:shared-venv
x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:fabri005@postgres:5432/pichangapp_dev}
  SECRET_KEY: "${SECRET_KEY}"
  ALGORITHM: "${ALGORITHM}"
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
  REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES}
  AUTH_INTERNAL_API_KEY: "${AUTH_INTERNAL_API_KEY}"
  AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth:8000}
  AUTH_SERVICE_TIMEOUT: ${AUTH_SERVICE_TIMEOUT:-10}
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
services:
  shared-venv:
    image: *shared-venv-image
    build:
      context: .
      dockerfile: services/shared-venv/Dockerfile
    command: ["/bin/true"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    ports:
      - "2181:2181"
    networks:
      - pichangapp-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_HOST://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_PUBLIC_HOST:-localhost}:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - pichangapp-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pichangapp
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - pichangapp-network

  postgres:
    image: fabrizziocastro/pichangapp-containers:postgres-17-cron
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pichangapp_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB:-pichangapp_dev}
      - -c
      - timezone=America/Lima
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pichangapp_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pichangapp-network

  auth:
    image: fabrizziocastro/pichangapp-containers:auth
    build:
      context: ./services/auth
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
    environment:
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      DEFAULT_SOCIAL_ROLE_ID: ${DEFAULT_SOCIAL_ROLE_ID}
      <<: *common-env
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - pichangapp-network

  booking:
    image: fabrizziocastro/pichangapp-containers:booking
    build:
      context: ./services/booking
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
    environment:
      <<: *common-env
    ports:
      - "8001:8001"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    networks:
      - pichangapp-network

  reservation:
    image: fabrizziocastro/pichangapp-containers:reservation
    build:
      context: ./services/reservation
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
    environment:
      NOTIFICATION_SERVICE_URL: http://notification:8004
      <<: *common-env
    ports:
      - "8002:8002"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    networks:
      - pichangapp-network

  notification:
    image: fabrizziocastro/pichangapp-containers:notification
    build:
      context: ./services/notification
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
    environment:
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME}"
      SMTP_USE_TLS: "${SMTP_USE_TLS}"
      SMTP_USE_SSL: "${SMTP_USE_SSL}"
      SMTP_TIMEOUT: ${SMTP_TIMEOUT}
      MANAGER_CONFIRMATION_SUBJECT: "${MANAGER_CONFIRMATION_SUBJECT}"
      USER_RECEIPT_SUBJECT: "${USER_RECEIPT_SUBJECT}"
      <<: *common-env
    ports:
      - "8004:8004"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8004"]
    networks:
      - pichangapp-network

  analytics:
    image: fabrizziocastro/pichangapp-containers:analytics
    build:
      context: ./services/analytics
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
    environment:
      <<: *common-env
    ports:
      - "8005:8005"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8005"]
    networks:
      - pichangapp-network

  rasa:
    image: fabrizziocastro/pichangapp-containers:rasa
    build:
      context: ./services/rasa
    environment:
      RASA_PRO_LICENSE: "${RASA_PRO_LICENSE}"
      POSTGRES_HOST: "${POSTGRES_HOST}"
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_SSL_MODE: "${POSTGRES_SSL_MODE}"
      ANALYTICS_SERVICE_URL: http://analytics:8005/api/pichangapp/v1
      RESERVATION_SERVICE_URL: http://reservation:8002/api/pichangapp/v1
      RASA_SERVER_URL: http://rasa:5005
      POSTGRES_APPLICATION_NAME: "${POSTGRES_APPLICATION_NAME}"
      DATABASE_URL: "${DATABASE_URL}"
      RASA_ENV: production
      RASA_TRACKER_DB: "${RASA_TRACKER_DB}"
      <<: *common-env
    ports:
      - "8006:8006"
      - "5055:5055"
    networks:
      - pichangapp-network

  gateway:
    image: fabrizziocastro/pichangapp-containers:gateway
    build:
      context: ./services/gateway
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - auth
      - booking
      - reservation
      - notification
      - analytics
      - rasa
    environment:
      AUTH_SERVICE_URL: http://auth:8000
      BOOKING_SERVICE_URL: http://booking:8001
      RESERVATION_SERVICE_URL: http://reservation:8002
      PAYMENT_SERVICE_URL: http://payment:8003
      NOTIFICATION_SERVICE_URL: http://notification:8004
      ANALYTICS_SERVICE_URL: http://analytics:8005
      CHATBOT_SERVICE_URL: http://rasa:8006
    ports:
      - "9000:9000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9000"]
    networks:
      - pichangapp-network

  # Placeholder if payment service is enabled later using the shared venv image
  payment:
    image: fabrizziocastro/pichangapp-containers:payment
    build:
      context: ./services/payment
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
    environment:
      <<: *common-env
    ports:
      - "8003:8003"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003"]
    profiles:
      - payment
    networks:
      - pichangapp-network

networks:
  pichangapp-network:
    external: true

volumes:
  pgdata:
    external: true
    name: pichangapp_pgdata
