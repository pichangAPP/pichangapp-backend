x-shared-venv-image: &shared-venv-image fabrizziocastro/pichangapp-containers:shared-venv
x-common-env: &common-env
  DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pichangapp_dev}
  SECRET_KEY: "${SECRET_KEY}"
  ALGORITHM: "${ALGORITHM}"
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
  REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES}
  AUTH_INTERNAL_API_KEY: "${AUTH_INTERNAL_API_KEY}"
  AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth:8000}
  AUTH_SERVICE_TIMEOUT: ${AUTH_SERVICE_TIMEOUT:-10}
  # URL pública HTTPS (Nginx → gateway); enlaces en emails / fallbacks que salen al cliente.
  PUBLIC_API_BASE_URL: "${PUBLIC_API_BASE_URL:-https://api.cuadraipe.com}"
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
  ERROR_LOGS_TOPIC: ${ERROR_LOGS_TOPIC:-error.logs}
# Límites de recursos (VM): definir en .env en la raíz del repo, p. ej. RASA_MEM_LIMIT=4g
services:
  shared-venv:
    image: *shared-venv-image
    build:
      context: .
      dockerfile: services/shared-venv/Dockerfile
    command: ["/bin/true"]
    deploy:
      resources:
        limits:
          cpus: "${SHARED_VENV_CPUS_LIMIT:-1.0}"
          memory: "${SHARED_VENV_MEM_LIMIT:-512m}"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: ["CMD-SHELL", "zookeeper-shell localhost:2181 ls / >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "2181:2181"
    networks:
      - pichangapp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${ZOOKEEPER_CPUS_LIMIT:-0.5}"
          memory: "${ZOOKEEPER_MEM_LIMIT:-512m}"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_HOST://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_PUBLIC_HOST:-localhost}:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - pichangapp-network
    deploy:
      resources:
        limits:
          cpus: "${KAFKA_CPUS_LIMIT:-1.0}"
          memory: "${KAFKA_MEM_LIMIT:-1g}"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pichangapp
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pichangapp-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      echo 'Creating Kafka topics...';
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic booking.events --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic reservation.notifications --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic error.logs --partitions 1 --replication-factor 1;
      echo 'Kafka topics OK';
      "
    restart: "no"
    networks:
      - pichangapp-network

  postgres:
    image: fabrizziocastro/pichangapp-containers:postgres-17-cron
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pichangapp_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB:-pichangapp_dev}
      - -c
      - timezone=America/Lima
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pichangapp_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pichangapp-network
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPUS_LIMIT:-1.0}"
          memory: "${POSTGRES_MEM_LIMIT:-1g}"
        reservations:
          memory: "${POSTGRES_MEM_RESERVATION:-512m}"

  auth:
    image: fabrizziocastro/pichangapp-containers:auth
    build:
      context: ./services/auth
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      shared-venv:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      FCM_FIREBASE_PROJECT_ID: "${FCM_FIREBASE_PROJECT_ID}"
      FCM_FIREBASE_CREDENTIALS_PATH: "${FCM_FIREBASE_CREDENTIALS_PATH}"
      DEFAULT_SOCIAL_ROLE_ID: ${DEFAULT_SOCIAL_ROLE_ID}
      KAFKA_AUTH_CLIENT_ID: ${KAFKA_AUTH_CLIENT_ID:-auth-svc}
      KAFKA_AUTH_CONSUMER_GROUP: ${KAFKA_AUTH_CONSUMER_GROUP:-auth-error-cg}
      KAFKA_AUTH_AUTO_OFFSET_RESET: ${KAFKA_AUTH_AUTO_OFFSET_RESET:-earliest}
      <<: *common-env
    volumes:
      - ./secrets/pushnotificationcuadra-firebase-adminsdk-fbsvc-f0961bc35b.json:/secrets/pushnotificationcuadra-firebase-adminsdk-fbsvc-f0961bc35b.json:ro
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    networks:
      - pichangapp-network

  booking:
    image: fabrizziocastro/pichangapp-containers:booking
    build:
      context: ./services/booking
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
      - postgres
    environment:
      SERVICE_NAME: booking-service
      KAFKA_BOOKING_CLIENT_ID: ${KAFKA_BOOKING_CLIENT_ID:-booking-svc}
      BOOKING_EVENTS_TOPIC: ${BOOKING_EVENTS_TOPIC:-booking.events}
      TIMEZONE: ${TIMEZONE:-America/Lima}
      IMAGE_URL_ALLOWED_HOSTS: "${IMAGE_URL_ALLOWED_HOSTS:-}"
      <<: *common-env
    ports:
      - "8001:8001"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped
    networks:
      - pichangapp-network

  reservation:
    image: fabrizziocastro/pichangapp-containers:reservation
    build:
      context: ./services/reservation
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
      - postgres
    environment:
      NOTIFICATION_SERVICE_URL: http://notification:8004
      SERVICE_NAME: reservation-service
      KAFKA_RESERVATION_CLIENT_ID: ${KAFKA_RESERVATION_CLIENT_ID:-reservation-svc}
      RESERVATION_NOTIFICATIONS_TOPIC: ${RESERVATION_NOTIFICATIONS_TOPIC:-reservation.notifications}
      TIMEZONE: ${TIMEZONE:-America/Lima}
      <<: *common-env
    ports:
      - "8002:8002"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    restart: unless-stopped
    networks:
      - pichangapp-network

  notification:
    image: fabrizziocastro/pichangapp-containers:notification
    build:
      context: ./services/notification
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      postgres:
        condition: service_started
      shared-venv:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: notification-service
      KAFKA_NOTIFICATION_CLIENT_ID: ${KAFKA_NOTIFICATION_CLIENT_ID:-notification-svc}
      KAFKA_NOTIFICATION_CONSUMER_GROUP: ${KAFKA_NOTIFICATION_CONSUMER_GROUP:-notification-cg}
      KAFKA_NOTIFICATION_AUTO_OFFSET_RESET: ${KAFKA_NOTIFICATION_AUTO_OFFSET_RESET:-earliest}
      RESERVATION_NOTIFICATIONS_TOPIC: ${RESERVATION_NOTIFICATIONS_TOPIC:-reservation.notifications}
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      FIREBASE_CREDENTIALS_PATH: "${FIREBASE_CREDENTIALS_PATH}"
      FIREBASE_STORAGE_BUCKET: "${FIREBASE_STORAGE_BUCKET}"
      FCM_FIREBASE_PROJECT_ID: "${FCM_FIREBASE_PROJECT_ID}"
      FCM_FIREBASE_CREDENTIALS_PATH: "${FCM_FIREBASE_CREDENTIALS_PATH}"
      FCM_ANDROID_NOTIFICATION_CHANNEL_ID: "${FCM_ANDROID_NOTIFICATION_CHANNEL_ID:-cuadra_notifications}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME}"
      SMTP_USE_TLS: "${SMTP_USE_TLS}"
      SMTP_USE_SSL: "${SMTP_USE_SSL}"
      SMTP_TIMEOUT: ${SMTP_TIMEOUT}
      MANAGER_CONFIRMATION_SUBJECT: "${MANAGER_CONFIRMATION_SUBJECT}"
      USER_RECEIPT_SUBJECT: "${USER_RECEIPT_SUBJECT}"
      APP_BRAND_NAME: "${APP_BRAND_NAME:-Cuadra!}"
      RESERVATION_PASS_FALLBACK_BASE_URL: "${RESERVATION_PASS_FALLBACK_BASE_URL:-https://api.cuadraipe.com/api/pichangapp/v1/notification/notifications/reservation-pass}"
      RESERVATION_PASS_TOKEN_SECRET: "${RESERVATION_PASS_TOKEN_SECRET}"
      RESERVATION_PASS_TOKEN_EXPIRE_DAYS: "${RESERVATION_PASS_TOKEN_EXPIRE_DAYS:-14}"
      RESERVATION_PASS_RATE_LIMIT_PER_MINUTE: "${RESERVATION_PASS_RATE_LIMIT_PER_MINUTE:-40}"
      RESERVATION_PASS_URL_TEMPLATE: "${RESERVATION_PASS_URL_TEMPLATE:-}"
      <<: *common-env
    volumes:
      # Debe ser un archivo JSON real en el host; si no existe, Docker crea un directorio y Firebase falla (EISDIR).
      - ./secrets/pichangapp-storage-firebase-adminsdk-fbsvc-fbdf826f9c.json:/secrets/pichangapp-storage-firebase-adminsdk-fbsvc-fbdf826f9c.json:ro
      - ./secrets/pushnotificationcuadra-firebase-adminsdk-fbsvc-f0961bc35b.json:/secrets/pushnotificationcuadra-firebase-adminsdk-fbsvc-f0961bc35b.json:ro
    ports:
      - "8004:8004"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8004"]
    restart: unless-stopped
    networks:
      - pichangapp-network

  analytics:
    image: fabrizziocastro/pichangapp-containers:analytics
    build:
      context: ./services/analytics
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - shared-venv
      - postgres
    environment:
      AUTH_INTERNAL_API_KEY: "${AUTH_INTERNAL_API_KEY}"
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth:8000}
      AUTH_SERVICE_TIMEOUT: ${AUTH_SERVICE_TIMEOUT:-10}
      KAFKA_ANALYTICS_CLIENT_ID: ${KAFKA_ANALYTICS_CLIENT_ID:-analytics-svc}
      KAFKA_ANALYTICS_CONSUMER_GROUP: ${KAFKA_ANALYTICS_CONSUMER_GROUP:-analytics-cg}
      KAFKA_ANALYTICS_AUTO_OFFSET_RESET: ${KAFKA_ANALYTICS_AUTO_OFFSET_RESET:-earliest}
      BOOKING_EVENTS_TOPIC: ${BOOKING_EVENTS_TOPIC:-booking.events}
      <<: *common-env
    ports:
      - "8005:8005"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8005"]
    restart: unless-stopped
    networks:
      - pichangapp-network

  rasa:
    image: fabrizziocastro/pichangapp-containers:rasa
    build:
      context: ./services/rasa
    environment:
      RASA_PRO_LICENSE: "${RASA_PRO_LICENSE}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-pichangapp_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SSL_MODE: "${POSTGRES_SSL_MODE}"
      ANALYTICS_SERVICE_URL: http://analytics:8005/api/pichangapp/v1
      RESERVATION_SERVICE_URL: http://reservation:8002/api/pichangapp/v1
      RASA_SERVER_URL: http://localhost:5005
      POSTGRES_APPLICATION_NAME: "${POSTGRES_APPLICATION_NAME}"
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}"
      RASA_ENV: production
      RASA_TRACKER_DB: "${RASA_TRACKER_DB}"
      <<: *common-env
    # Red: en producción expón solo el gateway FastAPI (8006) hacia fuera. Rasa (5005) y el
    # action server (5055) deberían ser solo red interna; quita el mapeo "5055:5055" si no
    # depuras acciones desde el host.
    ports:
      - "8006:8006"
      - "5055:5055"
    volumes:
      - ./services/rasa/artifacts/models:/app/artifacts/models
    networks:
      - pichangapp-network
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${RASA_CPUS_LIMIT:-2.0}"
          memory: "${RASA_MEM_LIMIT:-4g}"
        reservations:
          cpus: "${RASA_CPUS_RESERVATION:-0.5}"
          memory: "${RASA_MEM_RESERVATION:-2g}"

  payment:
    image: fabrizziocastro/pichangapp-containers:payment
    build:
      context: ./services/payment
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      shared-venv:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      PAYMENT_ALLOWED_STATUSES: ${PAYMENT_ALLOWED_STATUSES:-pending,paid,failed,cancelled}
      SERVICE_NAME: payment-service
      KAFKA_PAYMENT_CLIENT_ID: ${KAFKA_PAYMENT_CLIENT_ID:-payment-svc}
      <<: *common-env
    ports:
      - "8003:8003"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003"]
    restart: unless-stopped
    networks:
      - pichangapp-network

  gateway:
    image: fabrizziocastro/pichangapp-containers:gateway
    build:
      context: ./services/gateway
      args:
        SHARED_VENV_IMAGE: *shared-venv-image
    depends_on:
      - auth
      - booking
      - reservation
      - notification
      - analytics
      - rasa
      - payment
    environment:
      AUTH_SERVICE_URL: http://auth:8000
      BOOKING_SERVICE_URL: http://booking:8001
      RESERVATION_SERVICE_URL: http://reservation:8002
      PAYMENT_SERVICE_URL: http://payment:8003
      NOTIFICATION_SERVICE_URL: http://notification:8004
      ANALYTICS_SERVICE_URL: http://analytics:8005
      CHATBOT_SERVICE_URL: http://rasa:8006
    ports:
      - "127.0.0.1:9000:9000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9000"]
    restart: unless-stopped
    networks:
      - pichangapp-network

networks:
  pichangapp-network:
    name: pichangapp-network
    driver: bridge

volumes:
  pgdata:
    name: pichangapp_pgdata
  kafka_data:
  zookeeper_data:
  zookeeper_log:
